server:
  port: 8080

spring:
  application:
    name: complaint-management-service
  datasource:
    url: jdbc:h2:mem:complaintsdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: true

application:
  messaging:
    broker-name: complaint-broker
    queues:
      complaint-received: complaint.received.queue
      complaint-created: complaint.created.queue
      complaint-sla-warning: complaint.sla.warning.queue
    redelivery:
      maximum-redeliveries: 3
      initial-delay-millis: 250
      backoff-multiplier: 2.0
  resilience:
    profiles:
      persistence:
        max-attempts: 3
        wait-duration-millis: 100
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50.0
        wait-duration-in-open-state-millis: 5000
      messaging:
        max-attempts: 3
        wait-duration-millis: 100
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50.0
        wait-duration-in-open-state-millis: 5000
  scheduler:
    sla-warning-cron: 0 0 7 * * *

logging:
  level:
    root: INFO
